<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>류람쥐와 친구들 — 아케이드판</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a id="back-btn" href="../" aria-label="돌아가기">&#8592;</a>
    <style>
      #back-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        z-index: 9999;
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(16, 22, 40, 0.55);
        color: #fff; text-decoration: none;
        font-size: 22px; font-weight: 700;
        border-radius: 50%;
        backdrop-filter: blur(2px);
      }
      #back-btn:active { background: rgba(16, 22, 40, 0.8); }
    </style>

    <canvas id="game"></canvas>
    <script src="arcade-shim.js"></script>
    <script src="matter.min.js" defer></script>
    <script src="game.js" defer></script>
  </body>
</html>
